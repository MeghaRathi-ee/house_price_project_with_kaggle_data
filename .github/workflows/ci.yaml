name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn pyyaml \
                      mlflow fastapi uvicorn \
                      xgboost lightgbm evidently \
                      pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short


  pipeline:
    name: Run ML Pipeline
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install project dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn pyyaml \
                      mlflow fastapi uvicorn \
                      xgboost lightgbm evidently

      # Official DVC action — handles pathspec correctly
      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Install DVC Azure support
        run: pip install azure-storage-blob azure-identity

      - name: Configure DVC remote
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          dvc remote modify azure connection_string "$AZURE_STORAGE_CONNECTION_STRING"
          # Verify config was written
          cat .dvc/config
          # Verify secret is not empty
          echo "Secret length: ${#AZURE_STORAGE_CONNECTION_STRING}"

      - name: Pull data
        run: dvc pull

      - name: Run pipeline
        run: dvc repro

      - name: Check metrics
        run: |
          python3 -c "
          import json
          with open('data/reports/metrics.json') as f:
              m = json.load(f)
          print(f'R2: {m[\"r2\"]} | RMSE: {m[\"rmse\"]} | MAPE: {m[\"mape\"]}')
          print('Metrics check passed')
          "

      - name: Push to DVC remote
        run: dvc push

      - name: Commit updated files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add dvc.lock data/reports/metrics.json data/reports/model_comparison.json || true
          git diff --staged --quiet || git commit -m "ci: update artifacts [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Setup DVC
        uses: iterative/setup-dvc@v1

      - name: Install DVC Azure support
        run: pip install azure-storage-blob azure-identity

      - name: Pull model artifacts
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          dvc remote modify azure connection_string "$AZURE_STORAGE_CONNECTION_STRING"
          dvc pull model.pkl data/processed/preprocessor.pkl \
                   data/processed/outlier_bounds.json \
                   data/processed/selected_features.json

      - name: Build Docker image
        run: docker build -t house-price-api:latest .

      - name: Test Docker container
        run: |
          docker run -d -p 8000:8000 --name test-api house-price-api:latest
          sleep 10
          curl -f http://localhost:8000/health
          docker stop test-api && docker rm test-api