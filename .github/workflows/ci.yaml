name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Run tests
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short


  # ─────────────────────────────────────────
  # JOB 2: Run ML Pipeline with DVC
  # ─────────────────────────────────────────
  pipeline:
    name: Run ML Pipeline
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install DVC with pinned dependencies
        run: |
          pip install --upgrade pip
          # Force install exact versions — no upgrades allowed
          pip install --no-deps pathspec==1.0.4
          pip install --no-deps scmrepo==1.4.1
          pip install --no-deps dvc==2.58.2
          pip install azure-storage-blob azure-identity
          pip install gitpython dulwich funcy tqdm rich
          # Verify pathspec version
          python -c "import pathspec; print('pathspec:', pathspec.__version__)"
          # Verify DVC works
          dvc --version

      - name: Install project dependencies
        run: |
          pip install pandas numpy scikit-learn pyyaml \
                      mlflow fastapi uvicorn \
                      xgboost lightgbm evidently

      - name: Configure DVC Azure remote
        run: |
          dvc remote modify azure connection_string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      - name: Pull data from Azure
        run: dvc pull

      - name: Run DVC pipeline
        run: dvc repro

      - name: Check metrics
        run: |
          python << 'PYEOF'
          import json
          with open("data/reports/metrics.json") as f:
              metrics = json.load(f)
          print(f"R2   : {metrics['r2']}")
          print(f"RMSE : {metrics['rmse']}")
          print(f"MAPE : {metrics['mape']}")
          print("Metrics check passed")
          PYEOF

      - name: Push to Azure DVC remote
        run: dvc push

      - name: Commit dvc.lock and metrics
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add dvc.lock data/reports/metrics.json data/reports/model_comparison.json || true
          git diff --staged --quiet || git commit -m "ci: update dvc.lock and metrics [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ─────────────────────────────────────────
  # JOB 3: Build Docker image
  # ─────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install DVC
        run: |
          pip install pathspec==1.0.4
          pip install scmrepo==1.4.1
          pip install 'dvc[azure]'==2.58.2

      - name: Pull model artifacts
        run: |
          dvc remote modify azure connection_string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"
          dvc pull model.pkl data/processed/preprocessor.pkl \
                   data/processed/outlier_bounds.json \
                   data/processed/selected_features.json

      - name: Build Docker image
        run: |
          docker build -t house-price-api:${{ github.sha }} .
          docker tag house-price-api:${{ github.sha }} house-price-api:latest

      - name: Test Docker image
        run: |
          docker run -d -p 8000:8000 --name test-api house-price-api:latest
          sleep 10
          curl -f http://localhost:8000/health
          docker stop test-api
          docker rm test-api