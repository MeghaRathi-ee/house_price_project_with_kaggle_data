name: ML Pipeline CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Run tests
  # ─────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────
  # JOB 2: Run ML Pipeline with DVC
  # ─────────────────────────────────────────
  pipeline:
    name: Run ML Pipeline
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies (single source of truth)
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify installations
        run: |
          python --version
          dvc --version
          mlflow --version

      - name: Configure DVC Azure remote
        run: |
          dvc remote modify azure connection_string "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}"

      - name: Pull data
        run: dvc pull

      - name: Run pipeline
        run: dvc repro

      - name: Check metrics
        run: |
          python << 'PYEOF'
          import json
          with open("data/reports/metrics.json") as f:
              metrics = json.load(f)
          print(metrics)
          assert metrics["r2"] > 0.5, "Model performance too low!"
          PYEOF

      - name: Push artifacts
        run: dvc push

      - name: Commit updated files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add dvc.lock data/reports/*.json || true
          git diff --staged --quiet || git commit -m "ci: update artifacts [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────
  # JOB 3: Build Docker image
  # ─────────────────────────────────────────
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: pipeline
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t house-price-api:${{ github.sha }} .
          docker tag house-price-api:${{ github.sha }} house-price-api:latest

      - name: Test Docker container
        run: |
          docker run -d -p 8000:8000 --name test-api house-price-api:latest
          sleep 10
          curl -f http://localhost:8000/health
          docker stop test-api
          docker rm test-api